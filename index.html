---
layout: default
title: Main page
---

<div class="posts">
  {% for post in site.posts %}
    <article class="post">
    <center>
      <h1><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h1>

      <div class="entry">
        {{ post.excerpt }}
      </div>

      <a href="{{ site.baseurl }}{{ post.url }}" class="read-more">Read More</a>
    </center>
    </article>
  {% endfor %}
</div>
<p>
  <center>
  <a href="https://icarns.xyz/feed.xml">RSS</a>
  </center>
</p>
